<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Mandaditos Express</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="container">
    <h1>📦 Panel de Administración</h1>
    
    <div class="tabs">
        <button class="tab-btn active" data-tab="pedidos" onclick="cambiarPestaña('pedidos')">📦 Pedidos</button>
        <button class="tab-btn" data-tab="repartidores" onclick="cambiarPestaña('repartidores')">🛵 Repartidores</button>
        <button class="logout-btn" onclick="logout()">🚪 Cerrar sesión</button>
    </div>
    
    <div id="pedidos" class="contenedor-pedidos">
        <div class="loader">🔄 Cargando pedidos...</div>
    </div>
    
    <div id="repartidores" class="contenedor-repartidores" style="display: none;">
        <div class="loader">🔄 Cargando repartidores...</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="admin.js"></script>

</body>
</html>

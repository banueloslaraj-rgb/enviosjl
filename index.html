<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mandaditos Express</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app">

  <header>
    <h1>🛵 Mandaditos Express</h1>
    <p>Envíos rápidos</p>
  </header>

  <form id="pedidoForm" class="card">

    <input type="text" id="recoleccion" placeholder="📍 Dirección de recolección" required>
    <input type="text" id="entrega" placeholder="📍 Dirección de entrega" required>

    <input type="text" id="remitente" placeholder="👤 Quién envía" required>
    <input type="tel" id="telRemitente" placeholder="📞 Teléfono quien envía" required>

    <input type="text" id="destinatario" placeholder="👤 Quién recibe" required>
    <input type="tel" id="telDestinatario" placeholder="📞 Teléfono quien recibe" required>

    <textarea id="descripcion" placeholder="📦 ¿Qué se envía?" required></textarea>

    <input type="number" id="pago" placeholder="💰 ¿Cuánto se paga por el producto?" required>

    <input type="text" id="envioCalculado" placeholder="🚚 Costo de envío automático" readonly>

    <label class="file-label">
      📸 Subir fotos
      <input type="file" id="fotos" multiple>
    </label>

    <button type="submit">Solicitar ahora</button>

  </form>

  <p id="mensaje"></p>

</div>

<a href="https://wa.me/5213111063251" class="wpp-btn" target="_blank">💬</a>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="app.js"></script>

</body>
</html>
